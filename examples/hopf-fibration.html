<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topological Projections & Qubits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: sans-serif; }
        canvas { display: block; z-index: 1; }
        .ui-layer { position: absolute; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #38bdf8;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            transition: all 0.2s;
        }
        .tab-btn:hover { background: rgba(51, 65, 85, 0.9); }
        .tab-btn.active {
            background: rgba(14, 165, 233, 0.2);
            border-color: #0ea5e9;
            color: #38bdf8;
            font-weight: bold;
        }

        #split-line {
            position: absolute;
            top: 0; bottom: 0; left: 50%;
            width: 2px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.2), rgba(255,255,255,0));
            transform: translateX(-50%);
            z-index: 5;
        }
    </style>
</head>
<body>

    <!-- VISUAL DIVIDER FOR SPLIT SCREEN -->
    <div id="split-line" class="hidden pointer-events-none"></div>

    <!-- INTERACTION ZONES -->
    <div id="zone-left" class="ui-layer top-0 left-0 w-1/2 h-full z-[5] hidden pointer-events-auto"></div>
    <div id="zone-right" class="ui-layer top-0 right-0 w-1/2 h-full z-[5] hidden pointer-events-auto"></div>

    <!-- SPLIT SCREEN LABELS -->
    <div id="qubit-labels" class="ui-layer top-12 left-0 w-full flex justify-around px-[10%] hidden pointer-events-none">
        <h3 class="text-xl font-bold text-slate-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-wide">Hopf Fibration (S³)</h3>
        <h3 class="text-xl font-bold text-slate-300 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] tracking-wide">Bloch Sphere (S²)</h3>
    </div>

    <!-- TOP RIGHT: Tabs -->
    <div class="ui-layer top-5 right-5 flex flex-col gap-2 pointer-events-auto items-end">
        <button id="menu-toggle" class="tab-btn px-4 py-2 rounded-lg text-sm text-slate-300 border-slate-600/50 shadow-[0_0_10px_rgba(0,0,0,0.3)] flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            Menu
        </button>
        <div id="tabs-list" class="flex-col gap-2 hidden">
            <button onclick="switchTab('QUBIT_HOPF')" id="tab-QUBIT_HOPF" class="tab-btn active px-4 py-2 rounded-lg text-sm text-right text-sky-300 border-sky-600/50 shadow-[0_0_10px_rgba(14,165,233,0.3)]">Qubits (S³ ↔ S²)</button>
            <button onclick="switchTab('QUBIT_PATH')" id="tab-QUBIT_PATH" class="tab-btn px-4 py-2 rounded-lg text-sm text-right text-emerald-300 border-emerald-600/50 shadow-[0_0_10px_rgba(16,185,129,0.3)]">Draw Path (S³ ↔ S²)</button>
            <button onclick="switchTab('S2_S1')" id="tab-S2_S1" class="tab-btn px-4 py-2 rounded-lg text-sm text-right text-slate-300 mt-2">Sphere to Circle (S² → S¹)</button>
            <button onclick="switchTab('S2_R2')" id="tab-S2_R2" class="tab-btn px-4 py-2 rounded-lg text-sm text-right text-slate-300">Stereographic (S² → ℝ²)</button>
            <button onclick="switchTab('S3_HOPF')" id="tab-S3_HOPF" class="tab-btn px-4 py-2 rounded-lg text-sm text-right text-slate-300">Hopf Fibration (S³ → ℝ³)</button>
            <button onclick="switchTab('CYLINDER')" id="tab-CYLINDER" class="tab-btn px-4 py-2 rounded-lg text-sm text-right text-slate-300">Cylinder (S¹ × ℝ)</button>
        </div>
    </div>

    <!-- BOTTOM LEFT: Slider -->
    <div id="slider-container" class="ui-layer bottom-8 left-8 w-80 pointer-events-auto drop-shadow-lg">
        <input type="range" id="mappingSlider" min="0" max="2" step="0.01" value="0" class="mt-2 w-full">
        <div class="flex justify-between text-xs text-slate-200 mt-1 font-mono font-bold drop-shadow-md" id="slider-ticks">
            <span>Domain</span>
            <span>Target</span>
        </div>
    </div>

    <script>
        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f172a, 0.05);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.5, 2, 3);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Split Screen Setup
        const zoneLeft = document.getElementById('zone-left');
        const zoneRight = document.getElementById('zone-right');
        
        const cameraLeft = new THREE.PerspectiveCamera(45, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
        cameraLeft.position.set(5, 3, 5);
        const controlsLeft = new THREE.OrbitControls(cameraLeft, zoneLeft);
        controlsLeft.enableDamping = true; controlsLeft.dampingFactor = 0.05;

        const cameraRight = new THREE.PerspectiveCamera(45, (window.innerWidth / 2) / window.innerHeight, 0.1, 100);
        cameraRight.position.set(3, 2, 5);
        const controlsRight = new THREE.OrbitControls(cameraRight, zoneRight);
        controlsRight.enableDamping = true; controlsRight.dampingFactor = 0.05;

        // Interaction Setup
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let interactiveFibers = [];
        let interactivePoints = [];
        let activeQubitIndex = -1;
        const baseColors = [];

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);
        const pointLight2 = new THREE.PointLight(0x38bdf8, 0.8);
        pointLight2.position.set(-5, -5, -5);
        scene.add(pointLight2);

        // --- 2. SCENE GROUPS ---
        const groups = {
            S2_S1: new THREE.Group(),
            S2_R2: new THREE.Group(),
            S3_HOPF: new THREE.Group(),
            CYLINDER: new THREE.Group(),
            QUBIT_HOPF_LEFT: new THREE.Group(),
            QUBIT_HOPF_RIGHT: new THREE.Group(),
            QUBIT_PATH_LEFT: new THREE.Group(),
            QUBIT_PATH_RIGHT: new THREE.Group()
        };
        for (const key in groups) scene.add(groups[key]);

        // Shared Texture for particles
        const circleCanvas = document.createElement('canvas');
        circleCanvas.width = 32; circleCanvas.height = 32;
        const ctx = circleCanvas.getContext('2d');
        ctx.beginPath(); ctx.arc(16, 16, 14, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffffff'; ctx.fill();
        const particleTexture = new THREE.CanvasTexture(circleCanvas);

        // Reusable Nebula Generator for Hopf representations
        function createNebula(group) {
            const numParticles = 80000;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(numParticles * 3);
            const pCol = new Float32Array(numParticles * 3);
            let added = 0;
            while (added < numParticles) {
                const u1 = Math.random(), u2 = Math.random(), u3 = Math.random();
                const eta = Math.acos(Math.sqrt(u1));
                const phi = 2 * Math.PI * u2;
                const alpha = 2 * Math.PI * u3;
                
                const x4 = Math.cos(eta) * Math.sin(alpha + phi);
                if (x4 > 0.95) continue; 

                const denom = 1.0 - x4; 
                pPos[added*3] = (Math.sin(eta) * Math.cos(alpha)) / denom;
                pPos[added*3+1] = (Math.sin(eta) * Math.sin(alpha)) / denom;
                pPos[added*3+2] = (Math.cos(eta) * Math.cos(alpha + phi)) / denom;
                
                const col = new THREE.Color().setHSL(phi / (Math.PI * 2), 0.9, 0.4 + 0.3 * Math.sin(eta*2));
                pCol[added*3] = col.r; pCol[added*3+1] = col.g; pCol[added*3+2] = col.b;
                added++;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
            const pMat = new THREE.PointsMaterial({
                size: 0.02, map: particleTexture, vertexColors: true, transparent: true,
                opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false
            });
            group.add(new THREE.Points(pGeo, pMat));
        }

        // --- 3. BUILD SCENES ---

        // ==========================================
        // SCENE: QUBIT HOPF (Split Screen - Discrete)
        // ==========================================
        function buildQubitHopf() {
            const hopfGroup = groups.QUBIT_HOPF_LEFT;
            const sphereGroup = groups.QUBIT_HOPF_RIGHT;

            createNebula(hopfGroup);

            const sphereRadius = 2.0;
            const sGeo = new THREE.SphereGeometry(sphereRadius, 32, 32);
            const sMat = new THREE.MeshBasicMaterial({ color: 0x334155, wireframe: true, transparent: true, opacity: 0.2 });
            sphereGroup.add(new THREE.Mesh(sGeo, sMat));
            
            const axesHelper = new THREE.AxesHelper(sphereRadius * 1.2);
            axesHelper.material.opacity = 0.4; axesHelper.material.transparent = true;
            sphereGroup.add(axesHelper);

            const states = [];
            states.push({ eta: 0.001, phi: 0, l: 0.9, isCore: true });
            [ {e:Math.PI/8, n:12, l:0.7}, {e:Math.PI/4, n:16, l:0.6}, {e:3*Math.PI/8, n:24, l:0.4} ].forEach(t => {
                for(let i=0; i<t.n; i++){
                    states.push({ eta: t.e, phi: (i/t.n)*Math.PI*2, l: t.l, isCore: false });
                }
            });

            states.forEach((state, index) => {
                const {eta, phi, l, isCore} = state;
                
                let color;
                if (isCore) { color = new THREE.Color(0xffffff); } 
                else { color = new THREE.Color().setHSL(phi / (Math.PI * 2), 0.9, l); }
                baseColors[index] = color.clone();

                const fPts = [];
                for (let i = 0; i <= 150; i++) { 
                    const alpha = (i / 150) * Math.PI * 2;
                    const x1 = Math.sin(eta) * Math.cos(alpha);
                    const x2 = Math.sin(eta) * Math.sin(alpha);
                    const x3 = Math.cos(eta) * Math.cos(alpha + phi);
                    const x4 = Math.cos(eta) * Math.sin(alpha + phi);
                    const denom = 1.0001 - x4;
                    fPts.push(new THREE.Vector3(x1/denom, x2/denom, x3/denom));
                }
                const fMat = new THREE.LineBasicMaterial({
                    color: color.clone(), transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, linewidth: 2 
                });
                const fiberMesh = new THREE.Line(new THREE.BufferGeometry().setFromPoints(fPts), fMat);
                fiberMesh.userData = { isCore: isCore };
                hopfGroup.add(fiberMesh);
                interactiveFibers.push(fiberMesh);

                const theta = 2 * eta;
                const px = sphereRadius * Math.sin(theta) * Math.cos(phi);
                const pz = sphereRadius * Math.sin(theta) * Math.sin(phi);
                const py = sphereRadius * Math.cos(theta); 

                const ptGroup = new THREE.Group();
                ptGroup.position.set(px, py, pz);
                
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), new THREE.MeshBasicMaterial({ color: color }));
                const halo = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending }));
                ptGroup.add(core); ptGroup.add(halo);

                const hitbox = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 8), new THREE.MeshBasicMaterial({visible: false}));
                hitbox.userData = { index: index };
                ptGroup.add(hitbox);

                sphereGroup.add(ptGroup);
                interactivePoints.push(hitbox);
            });
        }

        // ==========================================
        // SCENE: QUBIT PATH (Split Screen - Drawing)
        // ==========================================
        let pathHitSphere;
        let pathMeshesLeft = [];
        let pathMeshesRight = [];
        let isDrawingPath = false;
        let lastDrawPoint = new THREE.Vector3();

        function buildQubitPath() {
            const hopfGroup = groups.QUBIT_PATH_LEFT;
            const sphereGroup = groups.QUBIT_PATH_RIGHT;

            createNebula(hopfGroup);

            // --- Add the 53 Reference Rings (Dim Background) ---
            const addBaseRing = (eta, phi, lightness, isCore) => {
                const color = isCore ? new THREE.Color(0xffffff) : new THREE.Color().setHSL(phi / (Math.PI * 2), 0.6, lightness * 0.5); // Muted colors for background
                const fPts = [];
                for (let i = 0; i <= 150; i++) { 
                    const alpha = (i / 150) * Math.PI * 2;
                    const x1 = Math.sin(eta) * Math.cos(alpha);
                    const x2 = Math.sin(eta) * Math.sin(alpha);
                    const x3 = Math.cos(eta) * Math.cos(alpha + phi);
                    const x4 = Math.cos(eta) * Math.sin(alpha + phi);
                    const denom = 1.0001 - x4;
                    fPts.push(new THREE.Vector3(x1/denom, x2/denom, x3/denom));
                }
                const fMat = new THREE.LineBasicMaterial({
                    color: color, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, linewidth: 1
                });
                hopfGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(fPts), fMat));
            };
            
            addBaseRing(0.001, 0, 0.9, true); // Core
            [ {e:Math.PI/8, n:12, l:0.7}, {e:Math.PI/4, n:16, l:0.6}, {e:3*Math.PI/8, n:24, l:0.4} ].forEach(t => {
                for(let i=0; i<t.n; i++) addBaseRing(t.e, (i/t.n)*Math.PI*2, t.l, false);
            });

            const sphereRadius = 2.0;
            const sGeo = new THREE.SphereGeometry(sphereRadius, 32, 32);
            const sMat = new THREE.MeshBasicMaterial({ color: 0x334155, wireframe: true, transparent: true, opacity: 0.3 });
            sphereGroup.add(new THREE.Mesh(sGeo, sMat));
            
            const axesHelper = new THREE.AxesHelper(sphereRadius * 1.2);
            axesHelper.material.opacity = 0.4; axesHelper.material.transparent = true;
            sphereGroup.add(axesHelper);

            // Invisible hit target for raycasting
            pathHitSphere = new THREE.Mesh(new THREE.SphereGeometry(sphereRadius, 32, 32), new THREE.MeshBasicMaterial({visible: false}));
            sphereGroup.add(pathHitSphere);

            // Add the initial North Pole state
            addPathState(new THREE.Vector3(0, 2.0, 0));
        }

        function clearPath() {
            pathMeshesLeft.forEach(m => {
                groups.QUBIT_PATH_LEFT.remove(m);
                if (m.geometry) m.geometry.dispose();
                if (m.material) m.material.dispose();
            });
            pathMeshesRight.forEach(m => {
                groups.QUBIT_PATH_RIGHT.remove(m);
                m.children.forEach(c => {
                    if (c.geometry) c.geometry.dispose();
                    if (c.material) c.material.dispose();
                });
            });
            pathMeshesLeft = [];
            pathMeshesRight = [];
        }

        function addPathState(pt) {
            lastDrawPoint.copy(pt);
            
            // Math to get spherical coordinates from Cartesian
            const nx = pt.x, ny = pt.y, nz = pt.z;
            const theta = Math.acos(ny / 2.0); // ny / radius
            let phi = Math.atan2(nz, nx);
            if (phi < 0) phi += 2 * Math.PI;
            const eta = theta / 2;

            // Generate nice color
            const color = new THREE.Color().setHSL(phi / (Math.PI * 2), 1.0, 0.7); // Boosted saturation & lightness for path
            if (eta < 0.05) color.setHex(0xffffff); // White near north pole

            // 1. Create Fiber (Left side)
            const fPts = [];
            for (let i = 0; i <= 100; i++) {
                const alpha = (i / 100) * Math.PI * 2;
                const x1 = Math.sin(eta) * Math.cos(alpha);
                const x2 = Math.sin(eta) * Math.sin(alpha);
                const x3 = Math.cos(eta) * Math.cos(alpha + phi);
                const x4 = Math.cos(eta) * Math.sin(alpha + phi);
                const denom = 1.0001 - x4;
                fPts.push(new THREE.Vector3(x1/denom, x2/denom, x3/denom));
            }
            const fMat = new THREE.LineBasicMaterial({
                color: color, transparent: true, opacity: 1.0, blending: THREE.AdditiveBlending, linewidth: 2
            });
            const fiberMesh = new THREE.Line(new THREE.BufferGeometry().setFromPoints(fPts), fMat);
            fiberMesh.renderOrder = 10; // Ensure drawn path renders on top of dim background
            groups.QUBIT_PATH_LEFT.add(fiberMesh);
            pathMeshesLeft.push(fiberMesh);

            // 2. Create Dot (Right side)
            const ptGroup = new THREE.Group();
            ptGroup.position.copy(pt);
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), new THREE.MeshBasicMaterial({ color: color }));
            const halo = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
            ptGroup.add(core); ptGroup.add(halo);
            groups.QUBIT_PATH_RIGHT.add(ptGroup);
            pathMeshesRight.push(ptGroup);
        }

        // ==========================================
        // ORIGINAL SCENES (Abridged generation calls)
        // ==========================================
        let s2s1Particles, s2r2Particles, cylParticles;
        const s2s1Orig=[], s2r2Orig=[], cylOrig=[], s2r2Rings=[], cylRings=[];
        const CYL_RADIUS = 1.5;

        function buildS2S1() {
            const g = groups.S2_S1;
            g.add(new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshBasicMaterial({ color: 0x1e293b, wireframe: true, transparent: true, opacity: 0.15 })));
            const eq = new THREE.Mesh(new THREE.TorusGeometry(1, 0.015, 16, 64), new THREE.MeshBasicMaterial({ color: 0xfde047 })); eq.rotation.x = Math.PI / 2; g.add(eq);
            for (let i = 0; i < 24; i++) {
                const theta = (i / 24) * Math.PI * 2, pts = [];
                for (let j = 0; j <= 50; j++) { const phi = (j / 50) * Math.PI; pts.push(new THREE.Vector3(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta))); }
                g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({ color: new THREE.Color().setHSL(theta/(Math.PI*2), 0.8, 0.5), transparent: true, opacity: 0.5 })));
            }
            const pGeo = new THREE.BufferGeometry(), pPos = new Float32Array(2000*3), pCol = new Float32Array(2000*3);
            for(let i=0;i<2000;i++){
                const t=Math.random()*Math.PI*2, v=(Math.random()*1.98)-0.99, p=Math.acos(v);
                const x=Math.sin(p)*Math.cos(t), z=Math.sin(p)*Math.sin(t), y=Math.cos(p);
                s2s1Orig.push(new THREE.Vector3(x,y,z));
                const c=new THREE.Color().setHSL((Math.atan2(z,x)+Math.PI)/(Math.PI*2),0.9,0.6);
                pCol[i*3]=c.r; pCol[i*3+1]=c.g; pCol[i*3+2]=c.b;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3)); pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
            s2s1Particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size: 0.05, vertexColors: true, map: particleTexture, transparent: true, alphaTest: 0.5})); g.add(s2s1Particles);
        }

        function buildS2R2() {
            const g = groups.S2_R2;
            const sph = new THREE.SphereGeometry(1, 32, 32); sph.translate(0, 1, 0); g.add(new THREE.Mesh(sph, new THREE.MeshBasicMaterial({ color: 0x1e293b, wireframe: true, transparent: true, opacity: 0.15 })));
            const pole = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshBasicMaterial({ color: 0xef4444 })); pole.position.set(0,2,0); g.add(pole);
            g.add(new THREE.GridHelper(15, 30, 0x334155, 0x1e293b));
            for (let i = 1; i <= 12; i++) {
                const v = -1.0 + (i / 13.5) * 1.9, phi = Math.acos(v), pts=[], orig=[], yA=Math.cos(phi)+1;
                const rC = new THREE.Color().setHSL(yA/2, 0.8, 0.6);
                for(let j=0; j<=64; j++) { const t=(j/64)*Math.PI*2, pt = new THREE.Vector3(Math.sin(phi)*Math.cos(t), yA, Math.sin(phi)*Math.sin(t)); pts.push(pt.clone()); orig.push(pt); }
                const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color: rC, linewidth: 2})); g.add(line); s2r2Rings.push({line, orig});
            }
            const pGeo = new THREE.BufferGeometry(), pPos = new Float32Array(2500*3), pCol = new Float32Array(2500*3);
            for (let i=0; i<2500; i++) {
                const t=Math.random()*Math.PI*2, v=(Math.random()*1.9)-1.0, p=Math.acos(v);
                const x=Math.sin(p)*Math.cos(t), y=Math.cos(p)+1, z=Math.sin(p)*Math.sin(t);
                s2r2Orig.push(new THREE.Vector3(x,y,z));
                const c=new THREE.Color().setHSL(y/2, 0.8, 0.6); pCol[i*3]=c.r; pCol[i*3+1]=c.g; pCol[i*3+2]=c.b;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3)); pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
            s2r2Particles = new THREE.Points(pGeo, new THREE.PointsMaterial({size: 0.05, vertexColors: true, map: particleTexture, transparent: true, alphaTest: 0.5})); g.add(s2r2Particles);
        }

        function buildS3Hopf() {
            const g = groups.S3_HOPF;
            createNebula(g);
            
            const addL = (e,p,c,o) => {
                const pts=[]; for(let i=0;i<=150;i++){const a=(i/150)*Math.PI*2, x4=Math.cos(e)*Math.sin(a+p), d=1.0001-x4; pts.push(new THREE.Vector3((Math.sin(e)*Math.cos(a))/d,(Math.sin(e)*Math.sin(a))/d,(Math.cos(e)*Math.cos(a+p))/d));}
                g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color:c, transparent:true, opacity:o, blending:THREE.AdditiveBlending})));
            };
            addL(0,0,0xffffff,0.9);
            [ {e:Math.PI/8, n:12, l:0.7}, {e:Math.PI/4, n:16, l:0.6}, {e:3*Math.PI/8, n:24, l:0.4} ].forEach(t => {
                for(let i=0;i<t.n;i++){ const phi=(i/t.n)*Math.PI*2; addL(t.e, phi, new THREE.Color().setHSL(phi/(Math.PI*2),0.9,t.l).getHex(), 0.8); }
            });
        }

        function buildCylinder() {
            const g = groups.CYLINDER;
            for(let i=0;i<9;i++){
                const y=(i-4)*0.8, orig=[]; for(let j=0;j<=100;j++){ orig.push({theta: -Math.PI+(j/100)*Math.PI*2, y}); }
                const line = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color: 0x38bdf8, linewidth: 2})); g.add(line); cylRings.push({line, orig});
            }
            const pGeo = new THREE.BufferGeometry(), pPos = new Float32Array(3000*3), pCol = new Float32Array(3000*3);
            for(let i=0; i<3000; i++) {
                const t=(Math.random()-0.5)*Math.PI*2, y=(Math.random()-0.5)*8; cylOrig.push({theta: t, y});
                const c=new THREE.Color().setHSL((y+4)/8, 0.8, 0.6); pCol[i*3]=c.r; pCol[i*3+1]=c.g; pCol[i*3+2]=c.b;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3)); pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
            cylParticles = new THREE.Points(pGeo, new THREE.PointsMaterial({size: 0.05, vertexColors: true, map: particleTexture, transparent: true, alphaTest: 0.5})); g.add(cylParticles);
        }

        const sliderLabelsMap = {
            S2_S1: ['Domain S²', 'Target S¹'],
            S2_R2: ['Sphere S²', 'Plane ℝ²'],
            CYLINDER: ['Cylinder S¹×ℝ', 'Plane ℝ²']
        };

        // --- 5. INITIALIZATION & LOGIC ---
        buildQubitHopf();
        buildQubitPath();
        buildS2S1();
        buildS2R2();
        buildS3Hopf();
        buildCylinder();

        let currentTab = 'QUBIT_HOPF';
        const sliderContainer = document.getElementById('slider-container');
        const slider = document.getElementById('mappingSlider');
        const splitLine = document.getElementById('split-line');
        const qubitLabels = document.getElementById('qubit-labels');

        const menuToggle = document.getElementById('menu-toggle');
        const tabsList = document.getElementById('tabs-list');
        menuToggle.addEventListener('click', () => {
            tabsList.classList.toggle('hidden');
            tabsList.classList.toggle('flex');
        });

        window.switchTab = function(tabId) {
            currentTab = tabId;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');

            for (const key in groups) {
                if (tabId === 'QUBIT_HOPF') {
                    groups[key].visible = (key === 'QUBIT_HOPF_LEFT' || key === 'QUBIT_HOPF_RIGHT');
                } else if (tabId === 'QUBIT_PATH') {
                    groups[key].visible = (key === 'QUBIT_PATH_LEFT' || key === 'QUBIT_PATH_RIGHT');
                } else {
                    groups[key].visible = (key === tabId);
                }
            }

            // UI Toggles
            if (tabId === 'QUBIT_HOPF' || tabId === 'QUBIT_PATH') {
                splitLine.classList.remove('hidden');
                qubitLabels.classList.remove('hidden');
                zoneLeft.classList.remove('hidden');
                zoneRight.classList.remove('hidden');
                sliderContainer.style.display = 'none';
                
                controls.enabled = false;
                controlsLeft.enabled = true;
                controlsRight.enabled = true;
                
                if (tabId === 'QUBIT_HOPF' && activeQubitIndex === -1) highlightQubitPair(1); 
            } else {
                splitLine.classList.add('hidden');
                qubitLabels.classList.add('hidden');
                zoneLeft.classList.add('hidden');
                zoneRight.classList.add('hidden');
                
                controls.enabled = true;
                controlsLeft.enabled = false;
                controlsRight.enabled = false;

                if (sliderLabelsMap[tabId]) {
                    sliderContainer.style.display = 'block';
                    document.getElementById('slider-ticks').innerHTML = `<span>${sliderLabelsMap[tabId][0]}</span><span>${sliderLabelsMap[tabId][1]}</span>`;
                    slider.max = (tabId === 'S2_S1') ? 2 : 1; slider.value = 0;
                } else {
                    sliderContainer.style.display = 'none';
                }

                // Adjust Camera
                if (tabId === 'S3_HOPF') camera.position.set(5, 3, 5);
                else if (tabId === 'S2_R2') camera.position.set(0, 5, 8);
                else if (tabId === 'CYLINDER') camera.position.set(0, 3, 8);
                else camera.position.set(2.5, 2, 3);
                controls.target.set(0,0,0);
            }
        };

        // --- Interaction Logic for Qubits (HOPF TAB) ---
        function highlightQubitPair(index) {
            activeQubitIndex = index;
            interactiveFibers.forEach((fiber, i) => {
                if (i === index) {
                    fiber.material.opacity = 1.0;
                    if (!fiber.userData.isCore) {
                        fiber.material.color.copy(baseColors[i]).offsetHSL(0, 0, 0.25); // bright highlight glow
                    }
                    fiber.renderOrder = 10;
                } else {
                    fiber.material.opacity = 0.15; 
                    fiber.material.color.copy(baseColors[i]); 
                    fiber.renderOrder = 0;
                }
            });
            interactivePoints.forEach((hitbox, i) => {
                const ptGroup = hitbox.parent;
                const core = ptGroup.children[0];
                const halo = ptGroup.children[1];
                if (i === index) {
                    core.scale.set(2.5, 2.5, 2.5);
                    halo.material.opacity = 0.9;
                    halo.scale.set(2.5, 2.5, 2.5);
                } else {
                    core.scale.set(1.0, 1.0, 1.0);
                    halo.material.opacity = 0.25;
                    halo.scale.set(1.0, 1.0, 1.0);
                }
            });
        }

        // --- Interaction Handlers (Shared Right Zone) ---
        zoneRight.addEventListener('pointerdown', (event) => {
            const rect = zoneRight.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, cameraRight);

            if (currentTab === 'QUBIT_PATH') {
                const intersects = raycaster.intersectObject(pathHitSphere);
                if (intersects.length > 0) {
                    isDrawingPath = true;
                    controlsRight.enabled = false; // Disable orbit to allow drawing
                    event.stopImmediatePropagation(); // Prevent OrbitControls rotation
                    clearPath();
                    addPathState(intersects[0].point);
                }
            } else if (currentTab === 'QUBIT_HOPF') {
                const intersects = raycaster.intersectObjects(interactivePoints);
                if (intersects.length > 0) {
                    highlightQubitPair(intersects[0].object.userData.index);
                    event.stopImmediatePropagation(); // Prevent OrbitControls if clicking point
                }
            }
        }, true);

        zoneRight.addEventListener('pointermove', (event) => {
            const rect = zoneRight.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, cameraRight);

            if (currentTab === 'QUBIT_HOPF') {
                const intersects = raycaster.intersectObjects(interactivePoints);
                zoneRight.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
            } else if (currentTab === 'QUBIT_PATH') {
                if (isDrawingPath) {
                    event.stopImmediatePropagation(); // Stop OrbitControls rotation while dragging
                    const intersects = raycaster.intersectObject(pathHitSphere);
                    if (intersects.length > 0) {
                        // Prevent adding too many dots
                        if (intersects[0].point.distanceTo(lastDrawPoint) > 0.15) { 
                            addPathState(intersects[0].point);
                        }
                    }
                } else {
                    const intersects = raycaster.intersectObject(pathHitSphere);
                    zoneRight.style.cursor = intersects.length > 0 ? 'crosshair' : 'default';
                }
            }
        }, true);

        window.addEventListener('pointerup', () => {
            if (isDrawingPath) {
                isDrawingPath = false;
                if (currentTab === 'QUBIT_PATH') controlsRight.enabled = true; // Re-enable orbit
            }
        }, true);

        // Init UI
        switchTab('QUBIT_PATH'); // Start on the new tab

        // --- 6. ANIMATION LOOP ---
        function getUnrolledPos(orig, progress) {
            let currX, currZ;
            if (progress >= 0.999) { currX = CYL_RADIUS * orig.theta; currZ = CYL_RADIUS; } 
            else { const R = CYL_RADIUS / (1 - progress), t = orig.theta * (1 - progress); currX = R * Math.sin(t); currZ = CYL_RADIUS - R + R * Math.cos(t); }
            return { x: currX, y: orig.y, z: currZ };
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const progress = parseFloat(slider.value);

            if (currentTab === 'QUBIT_HOPF' || currentTab === 'QUBIT_PATH') {
                controlsLeft.update();
                controlsRight.update();
                
                renderer.setScissorTest(true);
                const w = window.innerWidth;
                const h = window.innerHeight;
                
                // Left Pass (Hopf)
                renderer.setViewport(0, 0, w/2, h);
                renderer.setScissor(0, 0, w/2, h);
                if (currentTab === 'QUBIT_HOPF') {
                    groups.QUBIT_HOPF_LEFT.visible = true; groups.QUBIT_HOPF_RIGHT.visible = false;
                    renderer.render(scene, cameraLeft);
                    groups.QUBIT_HOPF_LEFT.visible = false; groups.QUBIT_HOPF_RIGHT.visible = true;
                } else {
                    groups.QUBIT_PATH_LEFT.visible = true; groups.QUBIT_PATH_RIGHT.visible = false;
                    renderer.render(scene, cameraLeft);
                    groups.QUBIT_PATH_LEFT.visible = false; groups.QUBIT_PATH_RIGHT.visible = true;
                }
                
                // Right Pass (Sphere)
                renderer.setViewport(w/2, 0, w/2, h);
                renderer.setScissor(w/2, 0, w/2, h);
                renderer.render(scene, cameraRight);
                
                renderer.setScissorTest(false);
                return; // skip main render
            } else {
                controls.update();
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
                renderer.setScissorTest(false);
            }

            if (currentTab === 'S2_S1') {
                const positions = s2s1Particles.geometry.attributes.position.array;
                for (let i = 0; i < 2000; i++) {
                    const o = s2s1Orig[i], r2d = Math.sqrt(o.x*o.x + o.z*o.z); 
                    let cX=o.x, cY=o.y, cZ=o.z;
                    if (progress <= 1.0) cY = o.y * (1 - progress);
                    else { const t = progress - 1.0; cX = o.x + (o.x/r2d - o.x) * t; cZ = o.z + (o.z/r2d - o.z) * t; cY = 0; }
                    positions[i*3]=cX; positions[i*3+1]=cY; positions[i*3+2]=cZ;
                }
                s2s1Particles.geometry.attributes.position.needsUpdate = true;

            } else if (currentTab === 'S2_R2') {
                const pos = s2r2Particles.geometry.attributes.position.array, ease = progress*progress*(3-2*progress);
                for (let i=0; i<2500; i++) {
                    const o = s2r2Orig[i], t = 2.0/(2.0-o.y);
                    pos[i*3] = o.x + (o.x*t - o.x)*ease; pos[i*3+1] = o.y - o.y*ease; pos[i*3+2] = o.z + (o.z*t - o.z)*ease;
                }
                s2r2Particles.geometry.attributes.position.needsUpdate = true;
                s2r2Rings.forEach(r => {
                    if (!r.line.geometry.attributes.position) r.line.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(r.orig.length * 3), 3));
                    const arr = r.line.geometry.attributes.position.array;
                    for (let j=0; j<r.orig.length; j++) { const o = r.orig[j], t = 2.0/(2.0-o.y); arr[j*3] = o.x + (o.x*t - o.x)*ease; arr[j*3+1] = o.y - o.y*ease; arr[j*3+2] = o.z + (o.z*t - o.z)*ease; }
                    r.line.geometry.attributes.position.needsUpdate = true;
                });

            } else if (currentTab === 'CYLINDER') {
                const pos = cylParticles.geometry.attributes.position.array;
                for(let i=0; i<3000; i++) { const p = getUnrolledPos(cylOrig[i], progress); pos[i*3]=p.x; pos[i*3+1]=p.y; pos[i*3+2]=p.z; }
                cylParticles.geometry.attributes.position.needsUpdate = true;
                cylRings.forEach(r => {
                    if (!r.line.geometry.attributes.position) r.line.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(r.orig.length * 3), 3));
                    const arr = r.line.geometry.attributes.position.array;
                    for (let j=0; j<r.orig.length; j++) { const p = getUnrolledPos(r.orig[j], progress); arr[j*3]=p.x; arr[j*3+1]=p.y; arr[j*3+2]=p.z; }
                    r.line.geometry.attributes.position.needsUpdate = true;
                });
                
            } else if (currentTab === 'S3_HOPF') {
                groups.S3_HOPF.rotation.y += 0.002;
                groups.S3_HOPF.rotation.x += 0.001;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Main camera
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            
            // Split cameras
            cameraLeft.aspect = (w / 2) / h;
            cameraLeft.updateProjectionMatrix();
            
            cameraRight.aspect = (w / 2) / h;
            cameraRight.updateProjectionMatrix();
            
            renderer.setSize(w, h);
        });

        animate();
    </script>
</body>
</html>
