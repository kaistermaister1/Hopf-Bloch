<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hopf-Bloch</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02050a;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      outline: none;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 2;
      padding: 8px 10px;
      border: 1px solid rgba(194, 207, 214, 0.35);
      background: rgba(7, 10, 15, 0.82);
      color: #dce9ec;
      font: 14px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="0"></canvas>
  <div id="status">Loading Hopf-Bloch...</div>

  <script>
    const canvas = document.getElementById("canvas");
    const status = document.getElementById("status");

    function syncCanvasSize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    syncCanvasSize();
    window.addEventListener("resize", syncCanvasSize);

    const hopfInput = {
      x: 0,
      y: 0,
      dx: 0,
      dy: 0,
      leftDown: false,
      leftPressed: false,
      leftReleased: false,
      rightDown: false,
      rightPressed: false,
      rightReleased: false,
      wheel: 0,
    };

    function updatePointer(event) {
      const rect = canvas.getBoundingClientRect();
      const x = (event.clientX - rect.left) * (canvas.width / rect.width);
      const y = (event.clientY - rect.top) * (canvas.height / rect.height);
      hopfInput.dx += x - hopfInput.x;
      hopfInput.dy += y - hopfInput.y;
      hopfInput.x = x;
      hopfInput.y = y;
    }

    canvas.addEventListener("pointermove", updatePointer);
    canvas.addEventListener("pointerdown", (event) => {
      updatePointer(event);
      hopfInput.dx = 0;
      hopfInput.dy = 0;
      if (event.button === 0) {
        hopfInput.leftDown = true;
        hopfInput.leftPressed = true;
      }
      if (event.button === 2) {
        hopfInput.rightDown = true;
        hopfInput.rightPressed = true;
      }
      canvas.focus();
      if (canvas.setPointerCapture) {
        canvas.setPointerCapture(event.pointerId);
      }
      event.preventDefault();
    });
    canvas.addEventListener("pointerup", (event) => {
      updatePointer(event);
      if (event.button === 0) {
        hopfInput.leftDown = false;
        hopfInput.leftReleased = true;
      }
      if (event.button === 2) {
        hopfInput.rightDown = false;
        hopfInput.rightReleased = true;
      }
      event.preventDefault();
    });
    canvas.addEventListener("pointercancel", (event) => {
      hopfInput.leftDown = false;
      hopfInput.leftReleased = true;
      hopfInput.rightDown = false;
      hopfInput.rightReleased = true;
      event.preventDefault();
    });
    canvas.addEventListener("wheel", (event) => {
      updatePointer(event);
      hopfInput.wheel += event.deltaY < 0 ? 1 : -1;
      event.preventDefault();
    }, { passive: false });
    canvas.addEventListener("contextmenu", (event) => event.preventDefault());

    window.Module = {
      canvas,
      hopfInput,
      print(text) {
        console.log(text);
      },
      printErr(text) {
        console.error(text);
      },
      setStatus(text) {
        status.textContent = text || "";
        status.style.display = text ? "block" : "none";
      },
      locateFile(path) {
        return path;
      },
    };

    window.addEventListener("load", () => canvas.focus());
  </script>
  <script async src="/hopf_bloch.js"></script>
</body>
</html>
